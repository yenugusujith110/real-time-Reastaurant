<<link rel="stylesheet" href="/static/style.css">

<div class="navbar">
    <h3>🛒 Your Cart</h3>
    <div>
        <a href="/home">Home</a>
        <a href="/contact">Contact</a>
    </div>
</div>

<div class="cart-container">

{% if cart|length == 0 %}
    <h3>Your cart is empty 😢</h3>
{% else %}

{% for cart_item in cart %}
<div class="cart-item">
    
    <!-- ITEM NAME -->
    <span>{{ cart_item.item.name }}</span>

    <!-- PRICE × QTY -->
    <span>₹{{ cart_item.item.price }} × {{ cart_item.qty }}</span>

    <!-- QUANTITY BUTTONS -->
    <div>
        <a href="/decrease/{{ loop.index0 }}">➖</a>
        <span>{{ cart_item.qty }}</span>
        <a href="/increase/{{ loop.index0 }}">➕</a>
    </div>

</div>
{% endfor %}

<hr>

<h3>Total: ₹{{ total }}</h3>

<a href="/checkout">
    <button class="pay-btn">Pay Now</button>
</a>

{% endif %}

</div>
